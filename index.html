    <script>
      (() => {
        const allowed = ['matching-gradient', 'spot', 'matching', 'dust']
        const fromUrl = new URLSearchParams(location.search).get('theme')
        let stored = null
        try { stored = localStorage.getItem('dicare-color-theme') } catch {}
        const theme = allowed.includes(fromUrl) ? fromUrl : allowed.includes(stored) ? stored : 'matching-gradient'
        document.documentElement.dataset.theme = theme
        const themeColors = {
          'matching-gradient': '#102423',
          spot: '#FFEFCA',
          matching: '#D0C4AB',
          dust: '#333A38',
        }
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', themeColors[theme])
      })()
    </script>
